<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Happy Birthday</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Pacifico&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(120deg, #ff9a9e, #fad0c4);
  overflow: hidden;
  text-align: center;
  color: #fff;
}

.container {
  padding-top: 80px;
}

h1 {
  font-family: 'Pacifico', cursive;
  font-size: 55px;
  animation: fadeIn 2s ease;
}

.card {
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(10px);
  padding: 30px;
  border-radius: 20px;
  width: 300px;
  margin: auto;
  animation: slideUp 1.5s ease;
}

img {
  width: 180px;
  border-radius: 10%;
  margin-bottom: 15px;
  animation: float 3s infinite ease-in-out;
}

.btn {
  padding: 12px 25px;
  border: none;
  background: white;
  color: #ff4d6d;
  border-radius: 25px;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
}

.message {
  margin-top: 20px;
  display: none;
  animation: fadeIn 2s ease;
}

@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

@keyframes slideUp {
  from {transform: translateY(50px); opacity: 0;}
  to {transform: translateY(0); opacity: 1;}
}

@keyframes float {
  0%,100% {transform: translateY(0);}
  50% {transform: translateY(-10px);}
}

.confetti {
  position: absolute;
  width: 12px;
  height: 12px;
  background: red;
  top: -10px;
  transform: rotate(45deg);
  animation: fall linear infinite;
}

.confetti::before,
.confetti::after {
  content: "";
  position: absolute;
  width: 12px;
  height: 12px;
  background: inherit;
  border-radius: 50%;
}

.confetti::before {
  top: -6px;
  left: 0;
}

.confetti::after {
  left: -6px;
  top: 0;
}

@keyframes fall {
  to {
    transform: translateY(100vh) rotate(360deg);
  }
}
</style>
</head>

<body>

<div class="container">
  <h1>Happy Birthday Raisya 🎉</h1>

  <div class="card">
    <img src="foto.jpg">

    <p>Hari ini hari spesial buat kamu ✨</p>

    <button class="btn" onclick="showSurprise()">Klik Surprise 🎁</button>

    <div class="message" id="msg">
      Semoga panjang umur, sehat selalu, dan semua impianmu tercapai 💖
        dari zulpa
    </div>
  </div>
</div>

<!-- AUDIO (TIDAK AUTOPLAY) -->
<audio id="music" loop>
  <source src="lagu.mp3" type="audio/mpeg">
</audio>

<script>
function showSurprise() {
  // tampilkan pesan
  document.getElementById("msg").style.display = "block";

  // mainkan musik
  let music = document.getElementById("music");
  music.play();

  // confetti
  createConfetti();
}

function createConfetti() {
  setInterval(() => {
    for (let i = 0; i < 30; i++) {
      let confetti = document.createElement("div");
      confetti.classList.add("confetti");

      let colors = ["#ff4d6d", "#ffd93d", "#6bcBef", "#9d4edd"];
confetti.style.background = colors[Math.floor(Math.random() * colors.length)];


      confetti.style.left = Math.random() * window.innerWidth + "px";
      confetti.style.animationDuration = (Math.random() * 3 + 2) + "s";

      document.body.appendChild(confetti);

      setTimeout(() => {
        confetti.remove();
      }, 5000);
    }
  }, 2000); // tiap 1.5 detik
}
</script>

</body>
</html>
